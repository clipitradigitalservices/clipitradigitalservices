name: Build and Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Inject Web3Forms API Key
        env:
          WPKEY: ${{ secrets.WPKEY }}
        run: |
          echo "Injecting API key into HTML files..."
          sed -i "s/WEB3FORMS_ACCESS_KEY_PLACEHOLDER/${WPKEY}/g" index.html
          sed -i "s/WEB3FORMS_ACCESS_KEY_PLACEHOLDER/${WPKEY}/g" contact.html
          echo "Done. Verifying..."
          grep -o 'value="[^"]*"' index.html | head -5
          echo "Injection complete."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
